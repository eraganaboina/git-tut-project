name: input work flow
on:
  push:
  workflow_dispatch:
    inputs:
      environment:
        default: "dev"
        required: true
        description: "select the environment"
        type: choice
        options:
          - dev
          - staging
          - prod
jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - run: echo "${{ github.event.inputs.environment }}"
      - uses: actions/checkout@v4
  
